# ============================================================
# CCSS-Scan — WORST CASE Nginx test config
# Contém as 8 misconfigurations do banco.
# Valores mutuamente exclusivos isolados em blocos server{}
# distintos (princípio worst-case).
# ============================================================

http {
    # Directivas de valor único — sem conflito, ficam ao nível http
    server_tokens on;
    send_timeout 0;
    client_max_body_size 0;

    # server 1 — keepalive_timeout=65 · ssl_protocols=SSLv3 · proxy_pass
    # ssl_protocols SSLv3 é semanticamente inválido sem SSL activo, mas
    # o parser é estático e regista-o na mesma (sem filtragem por contexto).
    server {
        listen 80;
        keepalive_timeout 65;
        ssl_protocols SSLv3;
        location /backend {
            proxy_pass http://127.0.0.1:8080;
        }
    }

    # server 2 — keepalive_timeout=0 · ssl_protocols=TLSv1 TLSv1.1 · ssl_session_tickets off
    server {
        listen 8080;
        keepalive_timeout 0;
        ssl_protocols TLSv1 TLSv1.1;
        ssl_session_tickets off;
    }

    # server 3 — ausência SSL (absence rules pilot)
    # ssl_certificate está presente (trigger) mas ssl_protocols, ssl_session_tickets
    # e ssl_stapling estão propositadamente ausentes. O scanner deve detetar as 3
    # ausências sem que nenhuma value-rule seja criada por este bloco.
    server {
        listen 443 ssl;
        ssl_certificate /etc/nginx/ssl.crt;
        ssl_certificate_key /etc/nginx/ssl.key;
    }
}
