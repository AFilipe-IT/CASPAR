# ============================================================
# CCSS-Scan — Nginx test config REALISTA (multi-token)
#
# Ao contrário de test_target/nginx.conf (worst-case com cada
# bad_value isolado numa linha), este config reflecte como um
# administrador escreve mesmo: vários protocolos numa só
# directiva ssl_protocols. Expõe o bug de match exacto em que
#   ssl_protocols SSLv3 TLSv1 TLSv1.1;
# não casava com os bad_value separados 'SSLv3' e 'TLSv1 TLSv1.1'.
#
# Cobre as value-rules + activa as 3 attack chains.
# ============================================================

http {
    server_tokens on;
    send_timeout 0;
    keepalive_timeout 0;
    client_max_body_size 0;

    server {
        listen 443 ssl;
        server_name realistic.example.com;

        ssl_certificate     /etc/nginx/ssl/server.crt;
        ssl_certificate_key /etc/nginx/ssl/server.key;

        # Multi-token numa só linha — o caso que o match exacto falhava.
        # Contém TODOS os bad_value de ssl_protocols do banco:
        #   'SSLv3'  e  'TLSv1 TLSv1.1'
        ssl_protocols SSLv3 TLSv1 TLSv1.1;

        ssl_session_tickets off;

        location / {
            proxy_pass http://127.0.0.1:8080;
        }
    }
}
