# ============================================================
# CCSS-Scan — Apache absence worst-case config
#
# Cobre as condições de trigger para todas as absence rules:
#   - SSLCertificateFile presente → dispara SSLUseStapling,
#                                    Header Strict-Transport-Security
#   - always → dispara Header Content-Security-Policy,
#               Header Referrer-Policy, Header Permissions-Policy
#
# Nenhuma das directivas requeridas está presente.
# ============================================================

ServerName example.com
ServerTokens Prod

<VirtualHost *:443>
    SSLEngine On
    SSLCertificateFile /etc/ssl/certs/server.crt
    SSLCertificateKeyFile /etc/ssl/private/server.key
    # SSLUseStapling On                              — propositadamente ausente
    # Header always set Strict-Transport-Security    — propositadamente ausente
    # Header always append Content-Security-Policy   — propositadamente ausente
    # Header set Referrer-Policy                     — propositadamente ausente
    # Header set Permissions-Policy                  — propositadamente ausente
</VirtualHost>
