# ============================================================
# CCSS-Scan — Nginx absence worst-case config
#
# Cobre as condições de trigger para todas as absence rules:
#   - ssl_certificate presente → dispara ssl_protocols, ssl_stapling
#   - proxy_pass presente → dispara proxy_ssl_verify, proxy_ssl_trusted_certificate,
#                           proxy_ssl_name
#
# Nenhuma das directivas requeridas está presente.
# ============================================================

http {
    server {
        listen 443 ssl;
        ssl_certificate /etc/nginx/ssl.crt;
        ssl_certificate_key /etc/nginx/ssl.key;
        # ssl_protocols       — propositadamente ausente (devia ser TLSv1.2 TLSv1.3)
        # ssl_stapling        — propositadamente ausente (devia ser on)

        location /api/ {
            proxy_pass https://upstream-server.internal;
            # proxy_ssl_verify               — propositadamente ausente (devia ser on)
            # proxy_ssl_trusted_certificate  — propositadamente ausente
            # proxy_ssl_name                 — propositadamente ausente
        }
    }
}
