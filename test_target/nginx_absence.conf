# ============================================================
# CCSS-Scan — Nginx absence worst-case config
#
# Contém as condições de trigger para as 3 absence rules SSL
# (ssl_certificate presente) mas NÃO contém ssl_protocols,
# ssl_session_tickets nem ssl_stapling.
# O scanner deve detectar as 3 ausências.
# ============================================================

http {
    server {
        listen 443 ssl;
        ssl_certificate /etc/nginx/ssl.crt;
        ssl_certificate_key /etc/nginx/ssl.key;
        # ssl_protocols       — propositadamente ausente (devia ser TLSv1.2 TLSv1.3)
        # ssl_session_tickets — propositadamente ausente (devia ser off)
        # ssl_stapling        — propositadamente ausente (devia ser on)
    }
}
