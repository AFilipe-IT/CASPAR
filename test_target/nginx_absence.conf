# ============================================================
# CCSS-Scan — Nginx absence worst-case config
#
# Cobre as condições de trigger para todas as absence rules:
#   - ssl_certificate presente → dispara ssl_protocols, ssl_stapling,
#                                 add_header HSTS
#   - proxy_pass presente → dispara proxy_ssl_verify,
#                            proxy_ssl_trusted_certificate, proxy_ssl_name
#   - always → dispara add_header X-Content-Type-Options,
#               add_header Content-Security-Policy,
#               add_header Referrer-Policy
#
# Nenhuma das directivas requeridas está presente.
# ============================================================

http {
    server {
        listen 443 ssl;
        ssl_certificate /etc/nginx/ssl.crt;
        ssl_certificate_key /etc/nginx/ssl.key;
        # ssl_protocols                   — ausente (devia ser TLSv1.2 TLSv1.3)
        # ssl_stapling                    — ausente (devia ser on)
        # add_header Strict-Transport-Security — ausente (HSTS)
        # add_header X-Content-Type-Options    — ausente
        # add_header Content-Security-Policy   — ausente
        # add_header Referrer-Policy           — ausente

        location /api/ {
            proxy_pass https://upstream-server.internal;
            # proxy_ssl_verify               — ausente (devia ser on)
            # proxy_ssl_trusted_certificate  — ausente
            # proxy_ssl_name                 — ausente
        }
    }
}
