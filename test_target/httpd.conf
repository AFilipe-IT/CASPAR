# ============================================================
# CCSS-Scan — WORST CASE test config
# Contém todas as 30 misconfigurations do banco.
# Valores exclusivos isolados em <Directory> distintos.
# ============================================================

ServerRoot "/usr/local/apache2"
Listen 80
Listen 443

User root
Group root
ServerSignature On
TraceEnable On
Timeout 300
KeepAlive Off
KeepAliveTimeout 300
MaxKeepAliveRequests 0
LogLevel emerg
FileETag All
LimitRequestLine 0
LimitRequestFields 0
LimitRequestFieldSize 0
LimitRequestBody 0
SSLCompression On

# LoadModule directives (5 vulnerable modules)
LoadModule autoindex_module modules/mod_autoindex.so
LoadModule dav_module modules/mod_dav.so
LoadModule info_module modules/mod_info.so
LoadModule status_module modules/mod_status.so
LoadModule userdir_module modules/mod_userdir.so

# ServerTokens — 3 valores exclusivos, isolados em contextos
ServerTokens Full
<Directory "/srv/st-minor">
    ServerTokens Minor
</Directory>
<Directory "/srv/st-os">
    ServerTokens OS
</Directory>

# SSLProtocol — 2 valores exclusivos
SSLProtocol All
<Directory "/srv/ssl-sslv3">
    SSLProtocol +SSLv3
</Directory>

# Options — 3 valores exclusivos, cada um sozinho na linha
<Directory "/srv/opt-all">
    Options All
</Directory>
<Directory "/srv/opt-fsl">
    Options FollowSymLinks
</Directory>
<Directory "/srv/opt-idx">
    Options Indexes
</Directory>

<Directory "/">
    AllowOverride All
    Order Allow,Deny
    Allow from all
</Directory>

