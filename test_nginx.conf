worker_processes  1;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile on;
    keepalive_timeout 65;

    server {
        listen 80;
        server_name localhost;

        root /var/www/html;
        index index.html index.htm;

        # MISCONFIG 1: directory listing enabled
        autoindex on;

        # MISCONFIG 2: unsafe file access
        location / {
            try_files $uri $uri/ =404;
        }

        # MISCONFIG 3: exposed sensitive path
        location /backup/ {
            alias /var/backups/;
            autoindex on;
        }

        # MISCONFIG 4: unsafe proxy (SSRF surface)
        location /proxy/ {
            proxy_pass http://127.0.0.1:8080;
            proxy_set_header Host $host;
        }

        # MISCONFIG 5: missing security headers
        # (intentionally omitted)

        # MISCONFIG 6: weak request handling
        client_max_body_size 0;
    }
}
