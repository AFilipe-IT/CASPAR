# Apache HTTP Server 2.4 — configuração intencionalmente insegura para testes

ServerRoot "/usr/local/apache2"

# Informação de versão exposta (CIS 8.1, 8.2)
ServerTokens Full
ServerSignature On

# Módulos perigosos (CIS 2.3, 2.4, 2.5)
LoadModule mpm_event_module modules/mod_mpm_event.so
LoadModule authz_core_module modules/mod_authz_core.so
LoadModule dir_module modules/mod_dir.so
LoadModule status_module modules/mod_status.so
LoadModule dav_module modules/mod_dav.so
LoadModule dav_fs_module modules/mod_dav_fs.so
LoadModule autoindex_module modules/mod_autoindex.so

# Processo como root (CIS 3.1)
User root
Group root

# HTTP TRACE activo (CIS 5.8)
TraceEnable On

# Timeouts permissivos (CIS 9.1, 9.3, 9.4)
Timeout 300
KeepAlive On
MaxKeepAliveRequests 0
KeepAliveTimeout 300

# Limites de request sem restrição (CIS 10.1, 10.2, 10.4)
LimitRequestLine 0
LimitRequestFields 0
LimitRequestBody 0

# SSL fraco (CIS 7.4, 7.7)
SSLProtocol All
SSLCompression On

# Logging mínimo (CIS 6.1)
LogLevel emerg

# Escuta em todas as interfaces
Listen 80

# Directório raiz permissivo (CIS 5.1, 4.4)
<Directory "/">
    Options Indexes FollowSymLinks
    AllowOverride All
    Order Allow,Deny
    Allow from all
    Require all granted
</Directory>

DocumentRoot "/usr/local/apache2/htdocs"

<Directory "/usr/local/apache2/htdocs">
    Options Indexes FollowSymLinks
    AllowOverride All
</Directory>

ErrorLog /proc/self/fd/2
CustomLog /proc/self/fd/1 common
