# nginx.conf — configuração DELIBERADAMENTE vulnerável
# Objectivo: disparar todas as 18 regras Nginx do banco CCSS-Scan
# e as 3 attack chains.

user  nginx;
worker_processes  1;

events {
    worker_connections  1024;
}

http {
    # --- value rules (always) ---
    server_tokens on;                      # bad_value: on  → version disclosure
    send_timeout 0;                        # bad_value: 0   → DoS slowloris
    keepalive_timeout 0;                   # bad_value: 0   → DoS connection slot
    client_max_body_size 0;                # bad_value: 0   → DoS body exhaustion

    # NOTA: nenhuma das add_header de segurança presente
    #   → dispara as 4 regras absence (X-Content-Type-Options,
    #     Content-Security-Policy, Referrer-Policy + HSTS via ssl_certificate)

    server {
        listen 443 ssl;
        server_name vulnerable.example.com;

        # --- activa as regras condicionais if_directive:ssl_certificate ---
        ssl_certificate     /etc/nginx/ssl/server.crt;
        ssl_certificate_key /etc/nginx/ssl/server.key;

        # --- value rules ssl_protocols (always) ---
        # Protocolos deprecados → POODLE/BEAST (chain server-info-to-tls-downgrade)
        ssl_protocols SSLv3 TLSv1 TLSv1.1;

        # bad_value: off → desactiva session tickets de forma insegura
        ssl_session_tickets off;

        # AUSENTES de propósito (absence, if_directive:ssl_certificate):
        #   - ssl_stapling
        #   - add_header Strict-Transport-Security (HSTS)

        location / {
            # --- value rule + activa if_directive:proxy_pass ---
            proxy_pass http://127.0.0.1:8080;   # bad_value: cleartext HTTP

            # AUSENTES de propósito (absence, if_directive:proxy_pass):
            #   - proxy_ssl_verify
            #   - proxy_ssl_name
            #   - proxy_ssl_trusted_certificate
        }
    }
}
